name: 台股每日選股掃描
on:
  schedule:
    - cron: '0 7 * * 1-5'        # 07:00 UTC = 15:00 台北，週一~五
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Taipei
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python run_daily.py
      - name: 提交當日報告
        run: |
          git config user.name  "stock-scan-bot"
          git config user.email "actions@users.noreply.github.com"
          git add reports/*.txt reports/run.log reports/skip.log 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "今日無新報告，略過。"
          else
            git commit -m "選股報告 $(date +%F)"
            git push
          fi
